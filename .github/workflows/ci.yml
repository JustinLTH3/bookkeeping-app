name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  Tests:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bookkeeping
          POSTGRES_PASSWORD: bookkeeping
          POSTGRES_DB: bookkeeping_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bookkeeping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://bookkeeping:bookkeeping@localhost:5432/bookkeeping_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          AUTH_SECRET: dummy-secret-for-ci
          AUTH_GOOGLE_ID: dummy
          AUTH_GOOGLE_SECRET: dummy
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      - run: npm test
      - run: npm run test:integration
